<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product Feed Viewer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <style>
    /* ===== TOKENS ===== */
    :root, [data-theme="light"] {
      --color-bg: #f7f6f2;
      --color-surface: #f9f8f5;
      --color-surface-2: #fbfbf9;
      --color-surface-offset: #f3f0ec;
      --color-border: #d4d1ca;
      --color-divider: #dcd9d5;
      --color-text: #28251d;
      --color-text-muted: #7a7974;
      --color-text-faint: #bab9b4;
      --color-text-inverse: #f9f8f4;
      --color-primary: #01696f;
      --color-primary-hover: #0c4e54;
      --color-success: #437a22;
      --color-success-highlight: #d4dfcc;
      --color-warning: #964219;
      --color-warning-highlight: #ddcfc6;
      --color-error: #a12c7b;
      --color-error-highlight: #e0ced7;
      --color-orange: #da7101;
      --color-orange-highlight: #e7d7c4;
      --radius-sm: 0.375rem;
      --radius-md: 0.5rem;
      --radius-lg: 0.75rem;
      --radius-xl: 1rem;
      --radius-full: 9999px;
      --shadow-sm: 0 1px 2px oklch(0.2 0.01 80 / 0.06);
      --shadow-md: 0 4px 12px oklch(0.2 0.01 80 / 0.08);
      --shadow-lg: 0 12px 32px oklch(0.2 0.01 80 / 0.12);
      --transition-interactive: 180ms cubic-bezier(0.16, 1, 0.3, 1);
      --font-body: 'Inter', sans-serif;
      --font-display: 'Instrument Serif', Georgia, serif;
      --text-xs: clamp(0.75rem, 0.7rem + 0.25vw, 0.875rem);
      --text-sm: clamp(0.875rem, 0.8rem + 0.35vw, 1rem);
      --text-base: clamp(1rem, 0.95rem + 0.25vw, 1.125rem);
      --text-lg: clamp(1.125rem, 1rem + 0.75vw, 1.5rem);
      --text-xl: clamp(1.5rem, 1.2rem + 1.25vw, 2.25rem);
      --text-2xl: clamp(2rem, 1.2rem + 2.5vw, 3.5rem);
      --space-1: 0.25rem; --space-2: 0.5rem; --space-3: 0.75rem;
      --space-4: 1rem; --space-6: 1.5rem; --space-8: 2rem;
      --space-10: 2.5rem; --space-12: 3rem; --space-16: 4rem;
      --content-default: 960px;
      --content-wide: 1200px;
    }
    [data-theme="dark"] {
      --color-bg: #171614;
      --color-surface: #1c1b19;
      --color-surface-2: #201f1d;
      --color-surface-offset: #1d1c1a;
      --color-border: #393836;
      --color-divider: #262523;
      --color-text: #cdccca;
      --color-text-muted: #797876;
      --color-text-faint: #5a5957;
      --color-text-inverse: #2b2a28;
      --color-primary: #4f98a3;
      --color-primary-hover: #227f8b;
      --color-success: #6daa45;
      --color-success-highlight: #3a4435;
      --color-warning: #bb653b;
      --color-warning-highlight: #564942;
      --color-error: #d163a7;
      --color-error-highlight: #4c3d46;
      --color-orange: #fdab43;
      --color-orange-highlight: #564b3e;
      --shadow-sm: 0 1px 2px oklch(0 0 0 / 0.2);
      --shadow-md: 0 4px 12px oklch(0 0 0 / 0.3);
      --shadow-lg: 0 12px 32px oklch(0 0 0 / 0.4);
    }
    @media (prefers-color-scheme: dark) {
      :root:not([data-theme]) {
        --color-bg: #171614; --color-surface: #1c1b19; --color-surface-2: #201f1d;
        --color-surface-offset: #1d1c1a; --color-border: #393836; --color-divider: #262523;
        --color-text: #cdccca; --color-text-muted: #797876; --color-text-faint: #5a5957;
        --color-primary: #4f98a3; --color-primary-hover: #227f8b;
        --color-success: #6daa45; --color-success-highlight: #3a4435;
        --color-warning: #bb653b; --color-warning-highlight: #564942;
        --color-error: #d163a7; --color-error-highlight: #4c3d46;
        --color-orange: #fdab43; --color-orange-highlight: #564b3e;
        --shadow-sm: 0 1px 2px oklch(0 0 0 / 0.2);
        --shadow-md: 0 4px 12px oklch(0 0 0 / 0.3);
        --shadow-lg: 0 12px 32px oklch(0 0 0 / 0.4);
      }
    }

    /* ===== BASE ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; -webkit-font-smoothing: antialiased; }
    body { min-height: 100dvh; font-family: var(--font-body); font-size: var(--text-base); color: var(--color-text); background: var(--color-bg); line-height: 1.6; }
    img { display: block; max-width: 100%; height: auto; }
    button { cursor: pointer; background: none; border: none; font: inherit; color: inherit; }
    a, button { transition: color var(--transition-interactive), background var(--transition-interactive), box-shadow var(--transition-interactive); }
    :focus-visible { outline: 2px solid var(--color-primary); outline-offset: 3px; border-radius: var(--radius-sm); }

    /* ===== LAYOUT ===== */
    .page-header {
      background: var(--color-surface);
      border-bottom: 1px solid oklch(from var(--color-text) l c h / 0.08);
      position: sticky; top: 0; z-index: 100;
      box-shadow: var(--shadow-sm);
    }
    .header-inner {
      max-width: var(--content-wide);
      margin-inline: auto;
      padding: var(--space-4) var(--space-6);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-4);
    }
    .logo {
      display: flex; align-items: center; gap: var(--space-3);
      text-decoration: none; color: var(--color-text);
    }
    .logo-icon {
      width: 36px; height: 36px;
      background: var(--color-primary);
      border-radius: var(--radius-md);
      display: grid; place-items: center;
      color: var(--color-text-inverse);
      flex-shrink: 0;
    }
    .logo-name { font-size: var(--text-base); font-weight: 600; letter-spacing: -0.01em; }
    .header-actions { display: flex; align-items: center; gap: var(--space-3); }
    .theme-toggle {
      width: 36px; height: 36px; border-radius: var(--radius-full);
      display: grid; place-items: center;
      color: var(--color-text-muted);
      border: 1px solid oklch(from var(--color-text) l c h / 0.1);
    }
    .theme-toggle:hover { background: var(--color-surface-offset); color: var(--color-text); }

    /* Feed URL bar */
    .feed-bar {
      max-width: var(--content-wide); margin-inline: auto;
      padding: var(--space-8) var(--space-6) var(--space-4);
    }
    .feed-bar-title { font-family: var(--font-display); font-size: var(--text-xl); margin-bottom: var(--space-2); }
    .feed-bar-sub { color: var(--color-text-muted); font-size: var(--text-sm); margin-bottom: var(--space-6); }
    .feed-input-row {
      display: flex; gap: var(--space-3); align-items: center;
      flex-wrap: wrap;
    }
    .feed-input {
      flex: 1; min-width: 220px;
      padding: var(--space-3) var(--space-4);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      background: var(--color-surface);
      color: var(--color-text);
      font-size: var(--text-sm);
      font-family: monospace;
      transition: border-color var(--transition-interactive), box-shadow var(--transition-interactive);
    }
    .feed-input:focus { border-color: var(--color-primary); box-shadow: 0 0 0 3px oklch(from var(--color-primary) l c h / 0.15); outline: none; }
    .btn-primary {
      padding: var(--space-3) var(--space-6);
      background: var(--color-primary);
      color: var(--color-text-inverse);
      border-radius: var(--radius-md);
      font-size: var(--text-sm); font-weight: 600;
      white-space: nowrap;
    }
    .btn-primary:hover { background: var(--color-primary-hover); }
    .btn-primary:active { transform: scale(0.98); }
    .btn-primary:disabled { opacity: 0.55; cursor: not-allowed; transform: none; }

    /* Filter bar */
    .filter-bar {
      max-width: var(--content-wide); margin-inline: auto;
      padding: 0 var(--space-6) var(--space-6);
      display: flex; gap: var(--space-3); flex-wrap: wrap; align-items: center;
    }
    .filter-label { font-size: var(--text-sm); color: var(--color-text-muted); font-weight: 500; }
    .filter-btn {
      padding: var(--space-2) var(--space-4);
      border-radius: var(--radius-full);
      font-size: var(--text-xs); font-weight: 600;
      border: 1px solid var(--color-border);
      color: var(--color-text-muted);
      letter-spacing: 0.02em;
    }
    .filter-btn:hover { background: var(--color-surface-offset); color: var(--color-text); }
    .filter-btn.active { background: var(--color-primary); color: var(--color-text-inverse); border-color: var(--color-primary); }
    .filter-count { font-size: var(--text-xs); color: var(--color-text-muted); margin-left: auto; }

    /* ===== GRID ===== */
    .products-wrap {
      max-width: var(--content-wide); margin-inline: auto;
      padding: 0 var(--space-6) var(--space-16);
    }
    .products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(min(260px, 100%), 1fr));
      gap: var(--space-6);
    }

    /* ===== CARD ===== */
    .product-card {
      background: var(--color-surface);
      border-radius: var(--radius-xl);
      border: 1px solid oklch(from var(--color-text) l c h / 0.07);
      box-shadow: var(--shadow-sm);
      overflow: hidden;
      display: flex; flex-direction: column;
      transition: box-shadow var(--transition-interactive), transform var(--transition-interactive);
    }
    .product-card:hover {
      box-shadow: var(--shadow-md);
      transform: translateY(-2px);
    }
    .card-image-wrap {
      aspect-ratio: 1/1;
      background: var(--color-surface-offset);
      overflow: hidden;
      position: relative;
    }
    .card-image-wrap img {
      width: 100%; height: 100%; object-fit: cover;
      transition: transform 300ms ease;
    }
    .product-card:hover .card-image-wrap img { transform: scale(1.04); }
    .availability-badge {
      position: absolute; top: var(--space-3); right: var(--space-3);
      padding: var(--space-1) var(--space-3);
      border-radius: var(--radius-full);
      font-size: var(--text-xs); font-weight: 700;
      letter-spacing: 0.04em; text-transform: uppercase;
    }
    .badge-instock { background: var(--color-success-highlight); color: var(--color-success); }
    .badge-outofstock { background: var(--color-error-highlight); color: var(--color-error); }
    .badge-preorder { background: var(--color-orange-highlight); color: var(--color-orange); }
    .card-body { padding: var(--space-4); flex: 1; display: flex; flex-direction: column; gap: var(--space-2); }
    .card-brand { font-size: var(--text-xs); color: var(--color-text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; }
    .card-title { font-size: var(--text-sm); font-weight: 600; line-height: 1.4; color: var(--color-text); }
    .card-category { font-size: var(--text-xs); color: var(--color-text-faint); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .card-meta { display: flex; gap: var(--space-2); flex-wrap: wrap; margin-top: auto; align-items: center; padding-top: var(--space-2); border-top: 1px solid var(--color-divider); }
    .card-price { font-size: var(--text-base); font-weight: 700; color: var(--color-primary); }
    .card-price-original { font-size: var(--text-xs); color: var(--color-text-muted); text-decoration: line-through; }
    .card-color { display: flex; align-items: center; gap: var(--space-1); font-size: var(--text-xs); color: var(--color-text-muted); margin-left: auto; }
    .color-dot { width: 10px; height: 10px; border-radius: var(--radius-full); border: 1px solid oklch(from var(--color-text) l c h / 0.2); }

    /* ===== STATES ===== */
    .state-wrap {
      max-width: var(--content-default); margin-inline: auto;
      padding: var(--space-16) var(--space-6);
      display: flex; flex-direction: column; align-items: center; text-align: center; gap: var(--space-4);
    }
    .state-icon { font-size: 3rem; }
    .state-title { font-size: var(--text-lg); font-weight: 600; color: var(--color-text); }
    .state-sub { font-size: var(--text-sm); color: var(--color-text-muted); max-width: 38ch; }
    .skeleton-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(min(260px, 100%), 1fr));
      gap: var(--space-6);
    }
    .skeleton-card { background: var(--color-surface); border-radius: var(--radius-xl); overflow: hidden; border: 1px solid oklch(from var(--color-text) l c h / 0.07); }
    .skeleton-img { aspect-ratio: 1/1; }
    .skeleton-body { padding: var(--space-4); display: flex; flex-direction: column; gap: var(--space-3); }
    @keyframes shimmer { 0%{background-position:-200% 0} 100%{background-position:200% 0} }
    .skeleton {
      background: linear-gradient(90deg, var(--color-surface-offset) 25%, var(--color-bg) 50%, var(--color-surface-offset) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s ease-in-out infinite;
      border-radius: var(--radius-sm);
    }
    @media (prefers-reduced-motion: reduce) {
      .skeleton { animation: none; }
    }

    /* XML code panel */
    .xml-panel {
      max-width: var(--content-wide); margin-inline: auto;
      padding: 0 var(--space-6) var(--space-8);
    }
    .xml-toggle-btn {
      display: flex; align-items: center; gap: var(--space-2);
      font-size: var(--text-sm); color: var(--color-text-muted); font-weight: 500;
      padding: var(--space-2) var(--space-3);
      border-radius: var(--radius-md);
      border: 1px solid var(--color-border);
      background: var(--color-surface);
      margin-bottom: var(--space-4);
    }
    .xml-toggle-btn:hover { background: var(--color-surface-offset); color: var(--color-text); }
    .xml-block {
      background: var(--color-surface-2);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      overflow: hidden; display: none;
    }
    .xml-block.open { display: block; }
    .xml-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: var(--space-3) var(--space-4);
      border-bottom: 1px solid var(--color-divider);
      font-size: var(--text-xs); color: var(--color-text-muted); font-weight: 600; letter-spacing: 0.04em;
    }
    .xml-copy { padding: var(--space-1) var(--space-3); border-radius: var(--radius-sm); border: 1px solid var(--color-border); font-size: var(--text-xs); font-weight: 600; }
    .xml-copy:hover { background: var(--color-primary); color: var(--color-text-inverse); border-color: var(--color-primary); }
    .xml-code { padding: var(--space-4); overflow-x: auto; font-family: monospace; font-size: 0.78rem; color: var(--color-text-muted); line-height: 1.7; white-space: pre; max-height: 320px; overflow-y: auto; }

    /* ===== MOBILE ===== */
    @media (max-width: 600px) {
      .feed-bar, .filter-bar, .products-wrap, .xml-panel { padding-inline: var(--space-4); }
      .feed-input-row { flex-direction: column; align-items: stretch; }
      .btn-primary { text-align: center; }
    }
  </style>
</head>
<body>

<header class="page-header">
  <div class="header-inner">
    <a class="logo" href="#">
      <div class="logo-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/>
        </svg>
      </div>
      <span class="logo-name">FeedViewer</span>
    </a>
    <div class="header-actions">
      <button class="theme-toggle" data-theme-toggle aria-label="Toggle dark mode">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </div>
  </div>
</header>

<main>
  <div class="feed-bar">
    <h1 class="feed-bar-title">Product Feed Viewer</h1>
    <p class="feed-bar-sub">Enter the URL or local path to your XML product feed file and hit Load.</p>
    <div class="feed-input-row">
      <input class="feed-input" id="feedUrl" type="text" value="product-feed.xml" placeholder="e.g. product-feed.xml or http://localhost/feed.xml" spellcheck="false" />
      <button class="btn-primary" id="loadBtn" onclick="loadFeed()">Load Feed</button>
    </div>
  </div>

  <div class="filter-bar" id="filterBar" style="display:none">
    <span class="filter-label">Filter:</span>
    <button class="filter-btn active" data-filter="all" onclick="applyFilter(this,'all')">All</button>
    <button class="filter-btn" data-filter="in stock" onclick="applyFilter(this,'in stock')">In Stock</button>
    <button class="filter-btn" data-filter="out of stock" onclick="applyFilter(this,'out of stock')">Out of Stock</button>
    <button class="filter-btn" data-filter="preorder" onclick="applyFilter(this,'preorder')">Pre-order</button>
    <span class="filter-count" id="filterCount"></span>
  </div>

  <div class="products-wrap">
    <div id="stateWrap" class="state-wrap">
      <div class="state-icon">📦</div>
      <p class="state-title">No feed loaded yet</p>
      <p class="state-sub">Paste the path to your <code>product-feed.xml</code> above and click <strong>Load Feed</strong>.</p>
    </div>
    <div id="productsGrid" class="products-grid"></div>
  </div>

  <div class="xml-panel" id="xmlPanel" style="display:none">
    <button class="xml-toggle-btn" onclick="toggleXml()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
      <span id="xmlToggleLabel">Show raw XML</span>
    </button>
    <div class="xml-block" id="xmlBlock">
      <div class="xml-header">
        <span>RAW XML SOURCE</span>
        <button class="xml-copy" onclick="copyXml()">Copy</button>
      </div>
      <pre class="xml-code" id="xmlCode"></pre>
    </div>
  </div>
</main>

<script>
  // Theme toggle
  (function(){
    const t = document.querySelector('[data-theme-toggle]');
    const r = document.documentElement;
    let d = matchMedia('(prefers-color-scheme:dark)').matches ? 'dark' : 'light';
    r.setAttribute('data-theme', d);
    const sunSvg = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>';
    const moonSvg = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
    if (d === 'light') t.innerHTML = moonSvg; else t.innerHTML = sunSvg;
    t && t.addEventListener('click', () => {
      d = d === 'dark' ? 'light' : 'dark';
      r.setAttribute('data-theme', d);
      t.innerHTML = d === 'dark' ? sunSvg : moonSvg;
    });
  })();

  let allProducts = [];
  let rawXml = '';

  function showSkeleton() {
    const grid = document.getElementById('productsGrid');
    document.getElementById('stateWrap').style.display = 'none';
    grid.innerHTML = Array(6).fill(0).map(() => `
      <div class="skeleton-card">
        <div class="skeleton-img skeleton"></div>
        <div class="skeleton-body">
          <div class="skeleton" style="height:0.8em;width:40%"></div>
          <div class="skeleton" style="height:1em;width:90%"></div>
          <div class="skeleton" style="height:0.8em;width:65%"></div>
          <div class="skeleton" style="height:0.9em;width:30%;margin-top:8px"></div>
        </div>
      </div>`).join('');
  }

  function getField(item, tag) {
    // Handles both g:tag and plain tag
    const ns = item.getElementsByTagNameNS('http://base.google.com/ns/1.0', tag);
    if (ns.length) return ns[0].textContent.trim();
    const plain = item.getElementsByTagName(tag);
    if (plain.length) return plain[0].textContent.trim();
    return '';
  }

  function availBadge(avail) {
    const a = avail.toLowerCase();
    if (a === 'in stock') return '<span class="availability-badge badge-instock">In Stock</span>';
    if (a === 'out of stock') return '<span class="availability-badge badge-outofstock">Out of Stock</span>';
    if (a === 'preorder') return '<span class="availability-badge badge-preorder">Pre-order</span>';
    return `<span class="availability-badge badge-preorder">${avail}</span>`;
  }

  function colorDot(colorName) {
    const map = {
      'black':'#1a1a1a','midnight black':'#1a1a1a','white':'#f5f5f5','pearl white':'#f0ece8',
      'grey':'#9e9e9e','space grey':'#6b6e73','red':'#c0392b','crimson red':'#b03a2e',
      'blue':'#2980b9','ocean blue':'#1a6e8e','purple':'#7d3c98','green':'#27ae60'
    };
    const key = colorName.toLowerCase();
    const bg = map[key] || '#bbb';
    return `<span class="color-dot" style="background:${bg}" title="${colorName}"></span>`;
  }

  function renderCard(p) {
    const salePrice = p.sale_price ? `<span class="card-price">${p.sale_price}</span><span class="card-price-original">${p.price}</span>` : `<span class="card-price">${p.price}</span>`;
    const colorHtml = p.color ? `<span class="card-color">${colorDot(p.color)} ${p.color}</span>` : '';
    const img = p.image_link || `https://picsum.photos/seed/${encodeURIComponent(p.id)}/600/600`;
    const categoryShort = (p.product_type || p.google_product_category || '').split('>').slice(-1)[0].trim();
    return `
    <article class="product-card" data-avail="${(p.availability||'').toLowerCase()}">
      <div class="card-image-wrap">
        <img src="${img}" alt="${p.title}" width="300" height="300" loading="lazy" onerror="this.src='https://picsum.photos/seed/${encodeURIComponent(p.id+'-fb')}/300/300'">
        ${availBadge(p.availability || '')}
      </div>
      <div class="card-body">
        ${p.brand ? `<span class="card-brand">${p.brand}</span>` : ''}
        <p class="card-title">${p.title}</p>
        ${categoryShort ? `<p class="card-category">${categoryShort}</p>` : ''}
        <div class="card-meta">
          ${salePrice}
          ${colorHtml}
        </div>
      </div>
    </article>`;
  }

  function parseAndRender(xmlText) {
    rawXml = xmlText;
    const parser = new DOMParser();
    const doc = parser.parseFromString(xmlText, 'text/xml');
    const parseError = doc.querySelector('parsererror');
    if (parseError) { showError('XML Parse Error', 'The file could not be parsed as valid XML. Check the file format.'); return; }
    const items = [...doc.querySelectorAll('item')];
    if (!items.length) { showError('No products found', 'The feed loaded OK but contains no &lt;item&gt; elements.'); return; }

    allProducts = items.map(item => ({
      id: getField(item,'id'),
      title: getField(item,'title'),
      description: getField(item,'description'),
      link: getField(item,'link'),
      image_link: getField(item,'image_link'),
      price: getField(item,'price'),
      sale_price: getField(item,'sale_price'),
      availability: getField(item,'availability'),
      condition: getField(item,'condition'),
      brand: getField(item,'brand'),
      product_type: getField(item,'product_type'),
      google_product_category: getField(item,'google_product_category'),
      color: getField(item,'color'),
      mpn: getField(item,'mpn'),
      item_group_id: getField(item,'item_group_id'),
    }));

    renderProducts(allProducts);
    document.getElementById('filterBar').style.display = 'flex';
    document.getElementById('xmlPanel').style.display = 'block';
    document.getElementById('xmlCode').textContent = xmlText;
  }

  function renderProducts(list) {
    const grid = document.getElementById('productsGrid');
    document.getElementById('stateWrap').style.display = list.length ? 'none' : 'flex';
    if (!list.length) {
      grid.innerHTML = '';
      document.getElementById('stateWrap').innerHTML = '<div class="state-icon">🔍</div><p class="state-title">No products match this filter</p>';
      document.getElementById('stateWrap').style.display = 'flex';
      document.getElementById('filterCount').textContent = '0 products';
      return;
    }
    grid.innerHTML = list.map(renderCard).join('');
    document.getElementById('filterCount').textContent = `${list.length} product${list.length !== 1 ? 's' : ''}`;
  }

  function applyFilter(btn, val) {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const filtered = val === 'all' ? allProducts : allProducts.filter(p => (p.availability||'').toLowerCase() === val);
    renderProducts(filtered);
  }

  function showError(title, sub) {
    const grid = document.getElementById('productsGrid');
    grid.innerHTML = '';
    const sw = document.getElementById('stateWrap');
    sw.style.display = 'flex';
    sw.innerHTML = `<div class="state-icon">⚠️</div><p class="state-title">${title}</p><p class="state-sub">${sub}</p>`;
    document.getElementById('filterBar').style.display = 'none';
    document.getElementById('xmlPanel').style.display = 'none';
  }

  function loadFeed() {
    const url = document.getElementById('feedUrl').value.trim();
    if (!url) return;
    const btn = document.getElementById('loadBtn');
    btn.disabled = true; btn.textContent = 'Loading…';
    showSkeleton();
    fetch(url)
      .then(r => { if (!r.ok) throw new Error(`HTTP ${r.status}`); return r.text(); })
      .then(xml => { parseAndRender(xml); })
      .catch(err => { showError('Could not load feed', `Make sure the file is served via a local server (e.g. XAMPP). Error: ${err.message}`); })
      .finally(() => { btn.disabled = false; btn.textContent = 'Load Feed'; });
  }

  function toggleXml() {
    const block = document.getElementById('xmlBlock');
    const lbl = document.getElementById('xmlToggleLabel');
    block.classList.toggle('open');
    lbl.textContent = block.classList.contains('open') ? 'Hide raw XML' : 'Show raw XML';
  }

  function copyXml() {
    navigator.clipboard.writeText(rawXml).then(() => {
      const btn = document.querySelector('.xml-copy');
      btn.textContent = 'Copied!';
      setTimeout(() => btn.textContent = 'Copy', 2000);
    });
  }

  // Auto-load on page open if the default path is set
  window.addEventListener('load', () => loadFeed());
</script>
</body>
</html>
